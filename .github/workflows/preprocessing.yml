name: Otomatisasi Preprocessing SML

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan kita klik tombol 'Run' secara manual di GitHub

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Setup Lingkungan Python (v3.12.7 Sesuai Arahan)
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: 3. Install Library (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Jalankan Script Automate
        run: |
          python preprocessing/automate_Achmad-Diky.py

      - name: 5. Simpan dan Push Hasil ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/housing_processed.csv
          git commit -m "Robot: Update data preprocessing terbaru" || echo "Tidak ada perubahan data baru"
          git push
